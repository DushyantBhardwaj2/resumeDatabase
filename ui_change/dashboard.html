<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResumeMint — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
@import url('https://fonts.cdnfonts.com/css/cabinet-grotesk');
@import url('https://fonts.cdnfonts.com/css/satoshi');

:root {
  --bg: #09090b; --surface: #0c0c0e; --card: #141417; --muted: #1a1a1e;
  --fg: #f2f2f4; --fg-2: #e4e4e7; --muted-fg: #a1a1aa; --meta: #71717a;
  --border: #27272b; --border-soft: #1e1e22;
  --accent: #16a34a; --accent-hover: #15803d; --accent-soft: rgba(22,163,74,0.12); --accent-glow: rgba(22,163,74,0.2);
  --success: #22c55e; --success-soft: rgba(34,197,94,0.12);
  --warn: #f59e0b; --danger: #ef4444;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --font-display: 'Cabinet Grotesk', 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-body: 'Satoshi', 'Inter', system-ui, sans-serif;
  --sidebar-w: 228px;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
.glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255,255,255,0.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.4); }
.glass-heavy { background: rgba(255,255,255,0.07); backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.08); }
.card-lift { transition: transform 0.35s var(--ease-out-expo), box-shadow 0.35s ease; }
.card-lift:hover { transform: translateY(-4px) scale(1.01); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 16px 40px rgba(22,163,74,0.1); }
.btn-glow { box-shadow: 0 0 0 0 rgba(22,163,74,0); transition: box-shadow 0.25s ease, transform 0.2s ease; }
.btn-glow:hover { box-shadow: 0 0 24px rgba(22,163,74,0.25); transform: translateY(-1px); }
.gradient-text { background: linear-gradient(135deg, #fafafa 0%, #4ade80 50%, #22c55e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); }
@keyframes fade-up { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes ats-grow { from { width: 0%; } to { width: 82%; } }
@keyframes pulse-glow { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
@keyframes count-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade-up { animation: fade-up 0.5s var(--ease-out-expo) both; }
.animate-fade-up-d1 { animation: fade-up 0.5s 0.08s var(--ease-out-expo) both; }
.animate-fade-up-d2 { animation: fade-up 0.5s 0.16s var(--ease-out-expo) both; }
.animate-fade-up-d3 { animation: fade-up 0.5s 0.24s var(--ease-out-expo) both; }
.animate-fade-up-d4 { animation: fade-up 0.5s 0.32s var(--ease-out-expo) both; }
.animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
@media (prefers-reduced-motion: reduce) {
  .animate-fade-up, .animate-fade-up-d1, .animate-fade-up-d2, .animate-fade-up-d3, .animate-fade-up-d4 { animation: none; opacity: 1; transform: none; }
  .animate-pulse-glow { animation: none; }
  .card-lift:hover { transform: none; }
}
</style>
</head>
<body>
<div class="bg-orb animate-pulse-glow" style="top:-10%;right:-5%;width:500px;height:500px;background:radial-gradient(circle,rgba(22,163,74,0.08) 0%,transparent 70%);"></div>
<div class="bg-orb animate-pulse-glow" style="bottom:-8%;left:-4%;width:400px;height:400px;background:radial-gradient(circle,rgba(34,197,94,0.05) 0%,transparent 70%);animation-delay:2s;"></div>
<div id="root" style="position:relative;z-index:1;"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function Sidebar({ activePage }) {
  const navItems = [
    { id:"home", icon:"\u25C9", label:"Home", href:"dashboard.html" },
    { id:"vault", icon:"\u25C6", label:"Career Vault", href:"career-vault.html" },
    { id:"tailor", icon:"\u25B6", label:"Tailor", href:"tailoring.html" },
    { id:"history", icon:"\u25CB", label:"History", href:"#" },
  ];
  const bottomItems = [{ id:"settings", icon:"\u2699", label:"Settings", href:"#" }];
  return (
    <div style={{ width:"var(--sidebar-w)", height:"100vh", display:"flex", flexDirection:"column", background:"var(--card)", borderRight:"1px solid var(--border-soft)", position:"fixed", left:0, top:0, zIndex:50, overflow:"hidden" }}>
      <div style={{ padding:"1.25rem 1.25rem 0.75rem", borderBottom:"1px solid var(--border-soft)" }}>
        <a href="index.html" style={{ fontFamily:"var(--font-display)", fontWeight:800, fontSize:"1.25rem", letterSpacing:"-0.03em", color:"var(--fg)", textDecoration:"none", display:"inline-flex", alignItems:"center", gap:8 }}>
          <span style={{ width:24, height:24, borderRadius:"var(--radius-sm)", background:"linear-gradient(135deg,#16a34a,#22c55e)", display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:"0.75rem", color:"white" }}>M</span>
          ResumeMint
        </a>
        <p style={{ fontSize:"0.6875rem", color:"var(--meta)", marginTop:2, fontFamily:"var(--font-body)" }}>Your career command center</p>
      </div>
      <nav style={{ flex:1, overflowY:"auto", padding:"0.5rem 0.75rem" }}>
        {navItems.map((item) => {
          const isActive = item.id === activePage;
          return (<a key={item.id} href={item.href}
            style={{ display:"flex", alignItems:"center", gap:10, padding:"0.5rem 0.75rem", borderRadius:"var(--radius-md)", marginBottom:2, fontSize:"0.875rem", fontWeight:isActive?600:400, color:isActive?"var(--accent)":"var(--muted-fg)", background:isActive?"var(--accent-soft)":"transparent", textDecoration:"none", transition:"all 0.15s ease", position:"relative" }}>
            <span style={{ fontSize:"0.875rem", width:18, textAlign:"center" }}>{item.icon}</span>
            {item.label}
            {isActive && <span style={{ position:"absolute", left:0, top:"25%", bottom:"25%", width:3, borderRadius:99, background:"var(--accent)" }} />}
          </a>);
        })}
      </nav>
      <div style={{ borderTop:"1px solid var(--border-soft)", padding:"0.5rem 0.75rem" }}>
        {bottomItems.map((item) => (<a key={item.id} href={item.href}
          style={{ display:"flex", alignItems:"center", gap:10, padding:"0.5rem 0.75rem", borderRadius:"var(--radius-md)", fontSize:"0.875rem", color:"var(--muted-fg)", textDecoration:"none", transition:"all 0.15s ease" }}>
          <span style={{ fontSize:"0.875rem", width:18, textAlign:"center" }}>{item.icon}</span>{item.label}
        </a>))}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"0.625rem 0.75rem", marginTop:4, borderRadius:"var(--radius-md)", background:"var(--surface)" }}>
          <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg,#16a34a,#22c55e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.6875rem", fontWeight:600, color:"white", flexShrink:0 }}>AD</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:"0.8125rem", fontWeight:500, color:"var(--fg)" }}>Alex D.</div>
            <div style={{ fontSize:"0.6875rem", color:"var(--meta)" }}>alex@example.com</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Widgets matching codebase architecture ──────────── */

function WelcomeWidget({ name }) {
  return (
    <div className="glass" style={{ borderRadius:"var(--radius-xl)", padding:"1.5rem 2rem", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:0, right:0, width:200, height:200, borderRadius:"50%", background:"radial-gradient(circle,rgba(22,163,74,0.06) 0%,transparent 70%)", transform:"translate(30%,-30%)" }} />
      <h1 style={{ fontFamily:"var(--font-display)", fontSize:"1.75rem", fontWeight:700, letterSpacing:"-0.03em", lineHeight:1.15, position:"relative" }}>
        Welcome back, <span className="gradient-text">{name}</span>
      </h1>
      <p style={{ color:"var(--muted-fg)", fontSize:"0.875rem", marginTop:6, maxWidth:400, fontFamily:"var(--font-body)", position:"relative" }}>
        Your vault has <strong style={{ color:"var(--accent)" }}>42 bullets</strong> across 4 experiences — ready to tailor.
      </p>
    </div>
  );
}

function StatsWidget({ education, experience, projects, skills }) {
  const items = [
    { label:"Education", value:education, icon:"\u2302" },
    { label:"Experience", value:experience, icon:"\u2692" },
    { label:"Projects", value:projects, icon:"\u2601" },
    { label:"Skills", value:skills, icon:"\u2699" },
  ];
  return (
    <div className="glass" style={{ borderRadius:"var(--radius-xl)", padding:"1.25rem 1.5rem", display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"0.5rem" }}>
      {items.map((item, i) => (
        <div key={i} style={{ textAlign:"center", padding:"0.5rem" }}>
          <div style={{ fontSize:"0.75rem", color:"var(--accent)", marginBottom:4, opacity:0.7 }}>{item.icon}</div>
          <div style={{ fontFamily:"var(--font-display)", fontSize:"1.5rem", fontWeight:700, color:"var(--fg)", letterSpacing:"-0.02em" }}>{item.value}</div>
          <div style={{ fontSize:"0.6875rem", color:"var(--muted-fg)", marginTop:2, fontFamily:"var(--font-body)" }}>{item.label}</div>
        </div>
      ))}
    </div>
  );
}

function CompletenessWidget({ percent }) {
  const segments = [
    { label:"Contact", pct:100 }, { label:"Experience", pct:85 },
    { label:"Education", pct:70 }, { label:"Projects", pct:60 },
    { label:"Skills", pct:90 }, { label:"Certificates", pct:40 },
  ];
  return (
    <div className="glass" style={{ borderRadius:"var(--radius-xl)", padding:"1.25rem 1.5rem" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"0.75rem" }}>
        <span style={{ fontSize:"0.8125rem", fontWeight:600, color:"var(--fg)", fontFamily:"var(--font-display)" }}>Profile Completeness</span>
        <span style={{ fontSize:"0.875rem", fontWeight:700, color:"var(--accent)", fontFamily:"var(--font-display)" }}>{percent}%</span>
      </div>
      <div style={{ height:6, borderRadius:99, background:"var(--muted)", overflow:"hidden", marginBottom:"0.75rem" }}>
        <div style={{ height:"100%", borderRadius:99, background:"linear-gradient(90deg,var(--accent),var(--success))", width:percent+"%", animation:"ats-grow 0.8s 0.2s var(--ease-out-expo) both" }} />
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"0.375rem" }}>
        {segments.map((seg) => (
          <div key={seg.label} style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ width:seg.pct >= 80 ? 6 : seg.pct >= 50 ? 6 : 6, height:6, borderRadius:"50%", background:seg.pct >= 80 ? "var(--success)" : seg.pct >= 50 ? "var(--warn)" : "var(--border)", flexShrink:0 }} />
            <span style={{ fontSize:"0.625rem", color:"var(--muted-fg)" }}>{seg.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function QuickActionsWidget() {
  const actions = [
    { icon:"\u270E", label:"Chat with AI to expand Vault", desc:"Tell the AI about your experience", color:"rgba(22,163,74,0.15)", href:"career-vault.html" },
    { icon:"\u2716", label:"Tailor a new Resume", desc:"Paste a JD and let AI select the best bullets", color:"rgba(34,197,94,0.1)", href:"tailoring.html" },
  ];
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"0.625rem" }}>
      {actions.map((a, i) => (
        <a key={i} href={a.href} className="glass card-lift" style={{ padding:"1rem 1.25rem", borderRadius:"var(--radius-lg)", textDecoration:"none", display:"flex", alignItems:"center", gap:"0.75rem", cursor:"pointer" }}>
          <span style={{ width:40, height:40, borderRadius:"var(--radius-md)", background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1rem", flexShrink:0, color:"var(--accent)" }}>{a.icon}</span>
          <div>
            <div style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:"0.875rem", color:"var(--fg)", letterSpacing:"-0.01em" }}>{a.label}</div>
            <div style={{ fontSize:"0.75rem", color:"var(--muted-fg)", marginTop:2, fontFamily:"var(--font-body)" }}>{a.desc}</div>
          </div>
        </a>
      ))}
    </div>
  );
}

function AtsWidget() {
  return (
    <div className="glass" style={{ borderRadius:"var(--radius-lg)", padding:"1.25rem 1.5rem" }}>
      <div style={{ display:"flex", alignItems:"center", gap:"0.75rem" }}>
        <span style={{ width:36, height:36, borderRadius:"var(--radius-sm)", background:"var(--accent-soft)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.875rem", flexShrink:0, color:"var(--accent)" }}>&#9776;</span>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
            <span style={{ fontSize:"0.75rem", color:"var(--muted-fg)", fontFamily:"var(--font-body)" }}>ATS Score — Last analyzed</span>
            <button className="btn-glow" style={{ padding:"4px 12px", borderRadius:"var(--radius-pill)", background:"var(--accent)", border:"none", color:"white", fontSize:"0.6875rem", fontWeight:600, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}
              onMouseEnter={(e) => e.currentTarget.style.background="var(--accent-hover)"}
              onMouseLeave={(e) => e.currentTarget.style.background="var(--accent)"}>Re-analyze</button>
          </div>
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:6 }}>
            <span style={{ fontFamily:"var(--font-display)", fontSize:"1.5rem", fontWeight:700, color:"var(--success)" }}>82</span>
            <span style={{ fontSize:"0.75rem", color:"var(--muted-fg)" }}>/100 &middot; Strong &mdash; 2 minor issues</span>
          </div>
          <div style={{ width:"100%", height:4, borderRadius:99, background:"var(--muted)", overflow:"hidden" }}>
            <div style={{ width:"82%", height:"100%", borderRadius:99, background:"linear-gradient(90deg,var(--accent),var(--success))", animation:"ats-grow 0.8s 0.3s var(--ease-out-expo) both" }} />
          </div>
        </div>
      </div>
    </div>
  );
}

function Dashboard() {
  return (
    <div style={{ display:"flex", minHeight:"100vh" }}>
      <div style={{ width:"var(--sidebar-w)", flexShrink:0 }}><Sidebar activePage="home" /></div>
      <div style={{ flex:1, padding:"2rem 2.5rem", overflow:"auto", maxWidth:"calc(100vw - var(--sidebar-w))" }}>
        <div className="animate-fade-up" style={{ marginBottom:"1.25rem" }}>
          <WelcomeWidget name="Alex" />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"1rem", marginBottom:"1.25rem" }}>
          <div className="animate-fade-up-d1">
            <StatsWidget education={2} experience={4} projects={6} skills={12} />
          </div>
          <div className="animate-fade-up-d2">
            <CompletenessWidget percent={74} />
          </div>
          <div className="animate-fade-up-d3">
            <AtsWidget />
          </div>
        </div>

        <div className="animate-fade-up-d4">
          <QuickActionsWidget />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
