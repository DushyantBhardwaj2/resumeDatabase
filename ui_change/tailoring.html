/* ─── Impact Badge ─────────────────────────────────── */
function ImpactBadge({ label, active }) {
  const colors = {
    Metrics: ["rgba(34,197,94,0.12)","#22c55e"], Leadership: ["rgba(22,163,74,0.12)","#4ade80"],
    Architecture: ["rgba(59,130,246,0.12)","#60a5fa"], "AI/ML": ["rgba(245,158,11,0.12)","#fbbf24"],
    Design: ["rgba(168,85,247,0.12)","#c084fc"], Optimization: ["rgba(6,182,212,0.12)","#22d3ee"],
    Collaboration: ["rgba(236,72,153,0.12)","#f472b6"], Accessibility: ["rgba(52,211,153,0.12)","#34d399"]
  };
  const c = colors[label] || ["var(--muted)","var(--muted-fg)"];
  return <span style={{ padding:"2px 8px", borderRadius:"var(--radius-pill)", fontSize:"0.5625rem", fontWeight:500, background: active ? c[0] : "var(--muted)", color: active ? c[1] : "var(--muted-fg)", whiteSpace:"nowrap" }}>{label}</span>;
}

/* ─── Splitter ─────────────────────────────────────── */
function Splitter({ onResize }) {
  const dragging = useRef(false);
  const startX = useRef(0);

  useEffect(() => {
    const handleMouseMove = (e) => {
      if (!dragging.current) return;
      const dx = e.clientX - startX.current;
      startX.current = e.clientX;
      onResize(dx);
    };
    const handleMouseUp = () => { dragging.current = false; document.body.style.cursor = ""; document.body.style.userSelect = ""; };
    window.addEventListener("mousemove", handleMouseMove);
    window.addEventListener("mouseup", handleMouseUp);
    return () => { window.removeEventListener("mousemove", handleMouseMove); window.removeEventListener("mouseup", handleMouseUp); };
  }, [onResize]);

  const handleMouseDown = (e) => {
    dragging.current = true;
    startX.current = e.clientX;
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  };

  return (
    <div onMouseDown={handleMouseDown} style={{ width:8, cursor:"col-resize", display:"flex", alignItems:"center", justifyContent:"center", background:"transparent", flexShrink:0, position:"relative", zIndex:10 }}>
      <div style={{ width:2, height:32, borderRadius:99, background:"var(--border)", transition:"background 0.15s, height 0.15s" }}
        onMouseEnter={(e) => { e.currentTarget.style.background = "var(--accent)"; e.currentTarget.style.height = "64px"; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = "var(--border)"; e.currentTarget.style.height = "32px"; }} />
    </div>
  );
}

/* ─── Main App — Split-Screen Builder ──────────────── */
function App() {
  const [selectedBullets, setSelectedBullets] = useState(["b1","b2","b3","b5","b7"]);
  const [jobDesc, setJobDesc] = useState("");

  const containerRef = useRef(null);
  const centerPercent = useRef(55);
  const STORAGE_KEY = "tailor-panel-widths";
  const MIN_CENTER_PX = 360;
  const MIN_PREVIEW_PX = 320;

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) centerPercent.current = parseFloat(saved);
    } catch {}
    applyWidths();
  }, []);

  const applyWidths = useCallback(() => {
    const container = containerRef.current;
    if (!container) return;
    const containerW = container.getBoundingClientRect().width;
    const centerEl = container.querySelector('[data-panel="center"]');
    const previewEl = container.querySelector('[data-panel="preview"]');
    if (!centerEl || !previewEl) return;
    const centerPx = (centerPercent.current / 100) * containerW;
    const clamped = Math.max(MIN_CENTER_PX, Math.min(centerPx, containerW - MIN_PREVIEW_PX));
    centerEl.style.width = clamped + "px";
    centerEl.style.flex = "none";
    previewEl.style.flex = "1 1 0";
    previewEl.style.minWidth = "0";
  }, []);

  useEffect(() => {
    const onResize = () => applyWidths();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [applyWidths]);

  const handleSplitter = useCallback((delta) => {
    const container = containerRef.current;
    if (!container) return;
    const containerW = container.getBoundingClientRect().width;
    if (containerW === 0) return;
    const centerEl = container.querySelector('[data-panel="center"]');
    if (!centerEl) return;
    const currentCenterPx = centerEl.getBoundingClientRect().width;
    const newCenterPx = Math.max(MIN_CENTER_PX, Math.min(currentCenterPx + delta, containerW - MIN_PREVIEW_PX));
    const pct = (newCenterPx / containerW) * 100;
    centerPercent.current = pct;
    try { localStorage.setItem(STORAGE_KEY, String(pct)); } catch {}
    centerEl.style.width = newCenterPx + "px";
    centerEl.style.flex = "none";
  }, []);

  const handleToggle = (expId, bulletId) => {
    setSelectedBullets((prev) =>
      prev.includes(bulletId) ? prev.filter((id) => id !== bulletId) : [...prev, bulletId]
    );
  };

  const handleAnalyze = (jd) => {
    setJobDesc(jd);
    setSelectedBullets(["b1","b2","b4","b5","b6","b7"]);
  };

  return (
    <div style={{ display:"flex", height:"100vh" }}>
      <div style={{ width:"var(--sidebar-w)", flexShrink:0 }}><Sidebar activePage="tailor" /></div>
      <div ref={containerRef} style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {/* Center Panel — Chat Workspace */}
        <div data-od-id="tailor-workspace" data-panel="center" style={{ display:"flex", flexDirection:"column", minWidth:0, borderRight:"1px solid var(--border-soft)", overflow:"hidden" }}>
          <GenerateChatWorkspace
            experiences={EXPERIENCES}
            selectedBullets={selectedBullets}
            onToggle={handleToggle}
            onAnalyze={handleAnalyze}
            jobDesc={jobDesc}
          />
        </div>

        {/* Splitter */}
        <Splitter onResize={handleSplitter} />

        {/* Preview Panel — PDF Renderer */}
        <div data-od-id="tailor-preview" data-panel="preview" style={{ display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden" }}>
          <PdfPreviewPanel experiences={EXPERIENCES} selectedBullets={selectedBullets} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
