services:
  - type: web
    name: resumint-backend
    env: node
    repo: https://github.com/DushyantBhardwaj2/resumemint
    branch: main
    rootDir: backend
    buildCommand: npm run build:backend
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: VERCEL_FRONTEND_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
