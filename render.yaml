services:
  - type: web
    name: resumint-backend
    env: docker
    repo: https://github.com/DushyantBhardwaj2/resumemint
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: VERCEL_FRONTEND_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: resumint-redis
          property: connectionString
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  - type: redis
    name: resumint-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
